conf:
    vanilla.txt:
        custom:
            map_path: '{custom_root}/custom'

    conf.yaml:
        output_root: .
        use_depend_texture_only: true
        mod_maps: [custom]
        render_conf:
            enable_cache: true
            break_key: <f9>

    B41:
        conf.yaml:
            render_conf:
                cell_range[default]:
                    - [26, 38, 1, 2]

    B42:
        conf.yaml:
            render_conf:
                cell_range[default]:
                    - [31, 44, 1, 2]

maps:
    B41:
        custom:
            - [27, 38]
            - [27, 39]
    B42:
        custom:
            - [32, 44]
            - [32, 45]